name: Validate catalog

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate index.json
        run: python validate.py
